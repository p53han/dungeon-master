name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            label: macos-arm64
          - runner: macos-13
            label: macos-x64
          - runner: windows-latest
            label: windows-x64
          - runner: ubuntu-22.04
            label: linux-x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "web/src-tauri -> target"

      - name: Sync Python dependencies
        run: uv sync --group dev

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run backend checks
        run: |
          uv run ruff check .
          uv run mypy src tests
          uv run pytest

      - name: Run frontend checks
        working-directory: web
        run: |
          npm run check
          npm test -- --run

      - name: Build desktop artifacts and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          tagName: desktop-v__VERSION__
          releaseName: "Desktop beta v__VERSION__"
          releaseBody: "Beta desktop artifacts for macOS, Windows, and Linux."
          releaseDraft: true
          prerelease: true
