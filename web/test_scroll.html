<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: white; padding: 50px; }
  .track {
    position: relative;
    width: 20px;
    height: 200px;
    background: #222;
  }
  .thumb {
    position: absolute;
    top: 10px;
    left: 1px;
    right: 1px;
    height: 50px;
    border: 1px solid rgba(0,0,0,0.85);
    background-image: url("public/textures/gold.jpg");
    background-size: cover;
  }
  .thumb::after {
    content: "";
    position: absolute;
    inset: 0;
    border-style: solid;
    border-width: 2px;
    border-top-color: rgba(255, 245, 200, 0.65);
    border-left-color: rgba(255, 245, 200, 0.35);
    border-bottom-color: rgba(30, 15, 5, 0.85);
    border-right-color: rgba(30, 15, 5, 0.65);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="track">
    <div class="thumb"></div>
  </div>
</body>
</html>
